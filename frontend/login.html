<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CalcPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode login-body">

    <div id="toast-container"></div>

    <div class="auth-container glass-panel animate-fade-in">
        <div class="auth-header">
            <i class="fa-solid fa-calculator logo-icon"></i>
            <h2>Welcome to CalcPro</h2>
            <p>Advanced calculations await.</p>
        </div>
        
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Register</button>
        </div>

        <form id="auth-form" class="auth-form">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Username" required autocomplete="off">
            </div>
            
            <div class="input-group animate-expand" id="email-group" style="display: none;">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="auth-submit-btn"><span id="auth-btn-text">Login</span> <i class="fa-solid fa-arrow-right"></i></button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
